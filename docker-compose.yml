services:
  web:
    image: hacktifytechnologies/protocol-phantom:1.0
    container_name: protocol-phantom
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: phantom-admin-secret-key-change-in-production
      FLASK_ENV: production
    volumes:
      - dbdata:/data
    restart: unless-stopped

volumes:
  dbdata:
